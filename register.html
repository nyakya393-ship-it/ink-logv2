<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>InkLog | 試合登録</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<!-- ======================
SIDEBAR
====================== -->

<aside class="sidebar">

<div class="logo">

<h1>InkLog</h1>

</div>

<nav>

<a href="index.html" class="nav-btn">
🏠 ホーム
</a>

<a href="register.html" class="nav-btn active">
🎮 試合登録
</a>

<a href="history.html" class="nav-btn">
📜 戦績
</a>

<a href="analysis.html" class="nav-btn">
📊 分析
</a>

<a href="badges.html" class="nav-btn">
🏅 バッジ
</a>

<a href="settings.html" class="nav-btn">
⚙️ 設定
</a>

</nav>

</aside>

<!-- ======================
MAIN
====================== -->

<main class="main">

<header class="topbar">

<h2>試合登録</h2>

</header>

<section class="page">

<form id="battleForm">

<!-- 基本情報 -->

<div class="form-section">

<h3>基本情報</h3>

<div class="form-grid">

<div class="form-item">

<label for="battleDate">

日時

</label>

<input
type="datetime-local"
id="battleDate"
required>

</div>

<!-- ======================
試合結果エリア（Part5-3）
====================== -->

<div class="form-section">

<h3>試合結果</h3>

<div class="form-grid">

<!-- 勝敗 -->
<div class="form-item">
<label for="result">結果</label>
<select id="result" required>
    <option value="win">🏆 勝利</option>
    <option value="lose">💀 敗北</option>
    <option value="disconnect">📡 通信切断</option>
    <option value="invalid">🚫 無効試合</option>
</select>
</div>

<!-- キル -->
<div class="form-item">
<label for="kill">キル</label>
<input type="number" id="kill" min="0" value="0">
</div>

<!-- アシスト -->
<div class="form-item">
<label for="assist">アシスト</label>
<input type="number" id="assist" min="0" value="0">
</div>

<!-- デス -->
<div class="form-item">
<label for="death">デス</label>
<input type="number" id="death" min="0" value="0">
</div>

<!-- スペシャル -->
<div class="form-item">
<label for="special">スペシャル</label>
<input type="number" id="special" min="0" value="0">
</div>

<!-- 塗りポイント -->
<div class="form-item">
<label for="paint">塗りポイント</label>
<input type="number" id="paint" min="0" value="0">
</div>

</div>

</div>

<div class="form-item">

<label for="battleType">

バトル種類

</label>

<select id="battleType">

<option>レギュラーマッチ</option>
<option>バンカラマッチ（チャレンジ）</option>
<option>バンカラマッチ（オープン）</option>
<option>Xマッチ</option>
<option>イベントマッチ</option>
<option>フェスマッチ</option>
<option>トリカラバトル</option>
<option>プライベートマッチ</option>

</select>

</div>

<div class="form-item">

<label for="rule">

ルール

</label>

<select id="rule">

<option>ナワバリバトル</option>
<option>ガチエリア</option>
<option>ガチヤグラ</option>
<option>ガチホコバトル</option>
<option>ガチアサリ</option>

</select>

</div>

<div class="form-item">

<label for="stage">

ステージ

</label>

<select id="stage">

<option>選択してください</option>

</select>

</div>

<div class="form-item">

<label for="weapon">

ブキ

</label>

<select id="weapon">

<option>選択してください</option>

</select>

</div>

<div class="form-item">

<label for="rank">

ウデマエ

</label>

<select id="rank">

<option>C-</option>
<option>C</option>
<option>C+</option>

<option>B-</option>
<option>B</option>
<option>B+</option>

<option>A-</option>
<option>A</option>
<option>A+</option>

<option>S</option>
<option>S+</option>

<option>X</option>

</select>

</div>

</div>

</div>

</section>

</main>

</div>

<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/register.js"></script>

</body>

</html>
